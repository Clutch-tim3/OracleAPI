services:
  - type: web
    name: oracleiq-api
    runtime: node
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: oracleiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: oracleiq-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /v1/health

  - type: postgres
    name: oracleiq-db
    version: 16

  - type: redis
    name: oracleiq-redis
    version: 7