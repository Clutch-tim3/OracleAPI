[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run build && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "api"

[[services]]
name = "redis"
image = "redis:7-alpine"

[services.redis.variables]
REDIS_PASSWORD = ""